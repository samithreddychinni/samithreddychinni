<svg fill="none" viewBox="0 0 800 200" width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- left border gradient -->
    <linearGradient id="borderGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="transparent" />
      <stop offset="40%" stop-color="#1f1f1f" />
      <stop offset="60%" stop-color="#1f1f1f" />
      <stop offset="100%" stop-color="transparent" />
    </linearGradient>

    <!-- scanline pattern -->
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="transparent" />
      <rect y="2" width="4" height="2" fill="rgba(255,255,255,0.013)" />
    </pattern>

    <clipPath id="typeout-clip">
      <rect class="clip-rect" x="0" y="70" width="0" height="60" />
    </clipPath>
  </defs>

  <style>
    .bg { fill: #080808; }
    
    text {
      font-family: 'Courier New', Courier, monospace;
    }
    
    .prompt {
      font-size: 10px;
      letter-spacing: 3px;
      fill: #242424;
      opacity: 0;
      animation: fadein 0.4s ease 0.2s forwards;
    }
    
    .name {
      font-size: 36px;
      letter-spacing: 12px;
      fill: #c6c6c6;
    }
    
    .sub {
      font-size: 9px;
      letter-spacing: 6px;
      fill: #1c1c1c;
      text-transform: uppercase;
      opacity: 0;
      animation: fadein 0.6s ease 3.2s forwards;
    }

    .cursor-group {
      transform: translateX(0);
      animation: moveCursor 2s steps(12) 0.6s forwards;
    }

    .cursor-blink {
      animation: blink 0.7s step-end 2.8s infinite;
    }

    .cursor-show {
      opacity: 0;
      animation: show 0.1s forwards 0.6s;
    }

    .clip-rect {
      animation: revealClip 2s steps(12) 0.6s forwards;
    }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(3px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes revealClip {
      from { width: 0; }
      to   { width: 420px; }
    }

    @keyframes moveCursor {
      from { transform: translateX(0); }
      to   { transform: translateX(403.2px); }
    }

    @keyframes show {
      to { opacity: 1; }
    }

    @keyframes blink {
      0%, 100% { opacity: 0; }
      50%      { opacity: 1; }
    }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg" />

  <!-- Scanlines -->
  <rect width="100%" height="100%" fill="url(#scanlines)" />

  <!-- Left Border Accent -->
  <rect x="0" y="40" width="1" height="120" fill="url(#borderGrad)" />

  <!-- Content Group -->
  <g transform="translate(60, 0)">
    <!-- Prompt: baseline 65 -->
    <text x="0" y="65" class="prompt" xml:space="preserve">~/samithreddy $  whoami</text>
    
    <!-- Name: baseline 117 -->
    <text x="0" y="117" class="name" clip-path="url(#typeout-clip)">samith reddy</text>
    
    <!-- Cursor -->
    <g class="cursor-group">
      <g class="cursor-blink">
        <rect x="0" y="87" width="2" height="34" class="cursor-show" fill="#c6c6c6" />
      </g>
    </g>
    
    <!-- Sub: baseline 146 -->
    <text x="0" y="146" class="sub" xml:space="preserve">go  ·  systems  ·  the layer below</text>
  </g>
</svg>
